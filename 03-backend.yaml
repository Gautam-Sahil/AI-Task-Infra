apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deploy
  namespace: ai-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: gautamsahil/ai-task-backend:47bcbfb2e624229091b0429863b840427f9d0cce
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: platform-config
        - secretRef:
            name: platform-secrets
        resources:
          requests:
            memory: "256Mi" # Increased
            cpu: "100m"
          limits:
            memory: "512Mi" # Increased
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /health   # Changed from /api/tasks
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health   # Changed from /api/tasks
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: ai-platform
spec:
  selector:
    app: backend
  ports:
  - port: 5000
    targetPort: 5000